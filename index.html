<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오거나이징 가이드</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg: #F6F6F3;
    --surface: #FFFFFF;
    --ink: #1B1C1A;
    --ink-soft: #63645F;
    --line: #E3E3DE;
    --accent: #E4141B;
    --accent-soft: #FCE9E8;
    --danger: #B3492B;
    --mono: 'SFMono-Regular', Menlo, Consolas, 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Malgun Gothic', sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5;}

  .case-A{--c:#C1440E;} .case-B{--c:#B08900;} .case-C{--c:#4C7A1F;} .case-D{--c:#1F7A5C;}
  .case-E{--c:#1F7A8C;} .case-F{--c:#2A5CA6;} .case-G{--c:#5B3FA6;} .case-H{--c:#9C2E8C;}
  .case-I{--c:#B32E5C;} .case-J{--c:#8C3A2E;} .case-K{--c:#5C5C1F;} .case-L{--c:#3A5C3A;}

  .login-gate{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;}
  .login-gate-box{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:36px 32px; max-width:360px; width:100%; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.08);}
  .login-gate-box .brand{font-size:22px; margin-bottom:16px;}
  .login-gate-box p{font-size:13px; color:var(--ink-soft); line-height:1.6; margin:0;}

  .topbar{position:sticky; top:0; z-index:20; background:var(--surface); border-bottom:1px solid var(--line);
    padding:14px 24px; display:flex; align-items:center; gap:16px;}
  .brand{font-weight:900; font-size:19px; letter-spacing:-0.03em; white-space:nowrap; text-transform:uppercase; color:var(--accent); background:none; border:none; cursor:pointer; padding:0; font-family:var(--sans); display:flex; align-items:baseline; gap:1px;}
  .brand:hover{opacity:.85;}
  .brand .r-mark{font-size:10px; vertical-align:super; margin-left:1px;}
  .brand .sub{font-size:10px; font-weight:600; letter-spacing:0; text-transform:none; color:var(--ink-soft); margin-left:8px; white-space:nowrap;}
  .brand span{color:var(--accent);}
  .search{flex:1; max-width:420px; position:relative;}
  .search input{width:100%; padding:9px 12px 9px 34px; border:1px solid var(--line); border-radius:8px;
    font-size:14px; background:var(--bg); color:var(--ink); font-family:var(--sans);}
  .search input:focus{outline:2px solid var(--accent); outline-offset:1px; background:var(--surface);}
  .search::before{content:"⌕"; position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--ink-soft); font-size:16px;}
  .role-toggle{display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:3px;}
  .role-toggle button{border:none; background:transparent; padding:6px 12px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-soft); font-family:var(--sans);}
  .role-toggle button.active{background:var(--ink); color:#fff;}
  .btn{border:none; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--sans); white-space:nowrap;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:#B80F15;}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink-soft);}

  main{max-width:1080px; margin:0 auto; padding:28px 24px 80px;}
  .view-note{font-size:12px; color:var(--ink-soft); background:var(--accent-soft); border:1px solid #cfe3dc; padding:8px 12px; border-radius:8px; margin-bottom:20px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px; cursor:pointer; transition:border-color .15s, transform .15s;}
  .card:hover{border-color:var(--accent); transform:translateY(-2px);}
  .card-top{display:flex; align-items:center; gap:7px; margin-bottom:2px;}
  .card-select{width:15px; height:15px; accent-color:var(--accent); cursor:pointer; flex-shrink:0;}
  .card-id{font-family:var(--mono); font-size:11px; color:var(--ink-soft); flex:1;}
  .card-delete{width:20px; height:20px; border-radius:50%; border:1px solid var(--line); background:var(--surface); color:var(--ink-soft); font-size:11px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .card-delete:hover{background:var(--danger); border-color:var(--danger); color:#fff;}
  .card-name{font-size:16px; font-weight:800; margin:4px 0 10px; letter-spacing:-0.01em;}
  .card-badges{display:flex; flex-wrap:wrap; gap:5px;}
  .empty{text-align:center; padding:60px 20px; color:var(--ink-soft); border:1px dashed var(--line); border-radius:12px; font-size:14px;}

  .selection-panel{background:var(--surface); border:1px solid var(--accent); border-radius:12px; padding:14px 16px; margin-bottom:16px;}
  .selection-head{display:flex; align-items:center; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:10px;}
  .selection-games{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .sel-chip{display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:4px 6px 4px 9px; border-radius:999px; background:var(--bg); border:1px solid var(--line); color:var(--ink-soft);}
  .sel-chip button{border:none; background:none; color:var(--ink-soft); cursor:pointer; font-size:11px; padding:0;}
  .sel-chip button:hover{color:var(--danger);}
  .selection-totals{display:flex; flex-wrap:wrap; gap:8px; padding-top:12px; border-top:1px solid var(--line);}

  .chip{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-weight:700; font-size:11px; padding:3px 7px 3px 5px; border-radius:4px; border:1.4px solid var(--c); color:var(--c); background:color-mix(in srgb, var(--c) 8%, white);}
  .chip .dot{width:7px; height:7px; border-radius:50%; background:var(--c);}

  .case-badge{display:inline-flex; align-items:center; gap:calc(7px * var(--ui-scale,1)); font-family:var(--mono); font-weight:800; font-size:calc(17px * var(--ui-scale,1)); padding:calc(6px * var(--ui-scale,1)) calc(12px * var(--ui-scale,1)) calc(6px * var(--ui-scale,1)) calc(9px * var(--ui-scale,1)); border-radius:7px; border:calc(2.2px * var(--ui-scale,1)) solid var(--c); color:var(--c); background:color-mix(in srgb, var(--c) 10%, white); line-height:1;}
  .case-badge .dot{width:calc(11px * var(--ui-scale,1)); height:calc(11px * var(--ui-scale,1)); border-radius:50%; background:var(--c); flex-shrink:0;}
  .case-badge .size-label{font-size:calc(10.5px * var(--ui-scale,1)); font-weight:600; color:var(--ink-soft); font-family:var(--sans); white-space:nowrap;}

  .detail-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px;}
  .back{background:none; border:none; color:var(--ink-soft); font-size:13px; cursor:pointer; padding:0; margin-bottom:10px; font-family:var(--sans);}
  .back:hover{color:var(--ink);}
  .detail-title{font-size:24px; font-weight:800; letter-spacing:-0.02em;}
  .detail-id{font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .game-note-area{flex:1; display:flex; justify-content:flex-end; max-width:380px;}
  .game-note-add{font-size:12px; color:var(--ink-soft); background:none; border:1px dashed var(--line); border-radius:7px; padding:7px 12px; cursor:pointer; font-family:var(--sans); align-self:flex-start;}
  .game-note-add:hover{color:var(--accent); border-color:var(--accent);}
  .game-note-input{width:100%; min-height:46px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px; font-family:var(--sans); resize:vertical; box-sizing:border-box;}
  .game-note-input:focus{border-color:var(--accent); outline:none;}
  .game-note-view{font-size:13px; color:#7a5b12; font-style:italic; background:#FFF6DE; border:1px solid #F0DFA8; border-radius:8px; padding:8px 12px; width:100%; text-align:left; line-height:1.5;}

  .tabs{display:flex; gap:4px; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:3px; margin-bottom:20px; width:fit-content;}
  .tabs button{border:none; background:transparent; padding:8px 16px; border-radius:7px; font-size:13px; font-weight:700; cursor:pointer; color:var(--ink-soft); font-family:var(--sans);}
  .tabs button.active{background:var(--surface); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.08);}

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:22px;}
  .panel-label{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:14px; display:flex; justify-content:space-between; align-items:center;}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .table-scroll table{min-width:620px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); padding:8px 10px; border-bottom:2px solid var(--ink);}
  td{padding:10px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.case-end td{border-bottom:2px solid var(--ink);}
  tr.case-end:last-child td{border-bottom:none;}
  td input, td select{width:100%; border:1px solid transparent; background:transparent; padding:5px 6px; border-radius:5px; font-size:13.5px; font-family:var(--sans); color:var(--ink);}
  td input:focus, td select:focus{border-color:var(--accent); background:var(--bg); outline:none;}
  .qty-col{width:70px;}
  .type-col{width:140px;}
  .note-col{min-width:150px;}
  .note-col input{width:100%; border:1px solid transparent; background:transparent; padding:5px 6px; border-radius:5px; font-size:12.5px; font-family:var(--sans); color:var(--ink);}
  .note-col input:focus{border-color:var(--accent); background:var(--bg); outline:none;}
  .row-del{background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:15px; padding:2px 6px;}
  .row-del:hover{color:var(--danger);}
  .add-row{font-size:13px; color:var(--accent); background:none; border:none; font-weight:700; cursor:pointer; padding:4px 0; font-family:var(--sans);}

  /* photo stage */
  .photo-pager{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .pager-btn{width:30px; height:30px; border-radius:50%; border:1px solid var(--line); background:var(--surface); cursor:pointer; font-size:14px; color:var(--ink);}
  .pager-btn:hover{border-color:var(--accent); color:var(--accent);}
  .pager-btn:disabled{opacity:.35; cursor:default;}
  .pager-dots{display:flex; gap:6px;}
  .pager-dots button{width:8px; height:8px; border-radius:50%; border:none; background:var(--line); cursor:pointer; padding:0;}
  .pager-dots button.active{background:var(--accent); width:18px; border-radius:4px;}
  .photo-count{font-size:12px; color:var(--ink-soft); font-family:var(--mono);}

  .photo-stage{position:relative; width:100%; aspect-ratio:4/3; border-radius:10px; overflow:hidden;
    background-color:#EDEDE8; background-size:cover; background-position:center;
    border:1px solid var(--line); user-select:none; transition:outline .1s;}
  .photo-stage.no-image{background-image:repeating-linear-gradient(45deg, #EDEDE8 0 12px, #F2F2ED 12px 24px);}
  .stage-img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:0;}
  .photo-stage.dragover{outline:3px dashed var(--accent); outline-offset:-3px;}
  .photo-actions{display:flex; gap:8px; margin-bottom:10px;}
  .upload-overlay{position:absolute; inset:0; background:rgba(255,255,255,.7); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--accent); z-index:5;}
  .photo-stage .ph-label{position:absolute; top:10px; left:12px; font-size:11px; color:var(--ink-soft); background:var(--surface); padding:3px 8px; border-radius:5px; border:1px solid var(--line);}
  .marker{position:absolute; width:var(--marker-size, 24px); height:var(--marker-size, 24px); border-radius:50%; border:2.5px solid #fff; background:var(--c); color:#fff; font-family:var(--mono); font-weight:700; font-size:calc(var(--marker-size, 24px) * 0.46);
    display:flex; align-items:center; justify-content:center; transform:translate(-50%,-50%); box-shadow:0 1px 4px rgba(0,0,0,.35); cursor:default; z-index:2;}
  .marker.editable{cursor:grab;}
  .marker.editable:active{cursor:grabbing;}
  .marker-size-control{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-soft);}
  .marker-size-control input[type=range]{width:110px;}
  .annot-line{stroke-width:3.2; fill:none; opacity:.85;}
  .anno-box{position:absolute; min-width:calc(120px * var(--ui-scale,1)); max-width:calc(280px * var(--ui-scale,1)); background:var(--surface); border:1px solid var(--line); border-left:4px solid var(--c); border-radius:6px; padding:calc(8px * var(--ui-scale,1)) calc(10px * var(--ui-scale,1)); font-size:calc(12px * var(--ui-scale,1)); box-shadow:0 2px 6px rgba(0,0,0,.08); transform:translateY(-50%); z-index:3;}
  .anno-box.draggable{cursor:grab;}
  .anno-box.draggable:active{cursor:grabbing;}
  .anno-box.readonly{width:auto; max-width:calc(260px * var(--ui-scale,1)); word-break:break-word;}
  .anno-head{display:flex; align-items:center; gap:calc(6px * var(--ui-scale,1)); margin-bottom:calc(6px * var(--ui-scale,1)); flex-wrap:wrap;}
  .anno-head select{font-family:var(--mono); font-weight:700; font-size:calc(11px * var(--ui-scale,1)); border:1px solid var(--line); border-radius:4px; padding:2px 4px; background:var(--bg);}
  .anno-remove{margin-left:auto; border:none; background:none; color:var(--ink-soft); cursor:pointer; font-size:calc(13px * var(--ui-scale,1)); line-height:1;}
  .anno-remove:hover{color:var(--danger);}
  .anno-item{display:flex; gap:5px; margin-bottom:4px; align-items:center;}
  .anno-item input[type=text]{flex:0 1 auto; min-width:50px; max-width:220px; border:1px solid var(--line); border-radius:4px; padding:3px 5px; font-size:calc(11.5px * var(--ui-scale,1)); font-family:var(--sans);}
  .anno-item input[type=number]{flex:0 0 auto; width:42px; border:1px solid var(--line); border-radius:4px; padding:3px 4px; font-size:calc(11.5px * var(--ui-scale,1)); font-family:var(--sans);}
  .anno-item button{border:none; background:none; color:var(--ink-soft); cursor:pointer; font-size:12px;}
  .anno-additem{font-size:11px; color:var(--accent); background:none; border:none; font-weight:700; cursor:pointer; padding:2px 0; font-family:var(--sans);}
  .anno-note-row{margin-top:6px;}
  .anno-note{width:100%; min-height:38px; border:1px solid var(--line); border-radius:4px; padding:5px 6px; font-size:11px; font-family:var(--sans); resize:vertical; box-sizing:border-box;}
  .anno-note-add{font-size:11px; color:var(--ink-soft); background:none; border:none; font-weight:700; cursor:pointer; padding:2px 0; font-family:var(--sans); margin-top:4px; display:block;}
  .anno-note-add:hover{color:var(--accent);}
  .anno-note-view{margin-top:6px; padding-top:5px; border-top:1px dashed var(--line); color:var(--ink-soft); font-style:italic; line-height:1.4;}
  .anno-label-btn{background:#000; color:#fff; border:none; border-radius:4px; font-size:10px; padding:3px 8px; cursor:pointer; font-weight:700; margin-left:auto;}
  .anno-label-btn:hover{background:#2a2a2a;}

  .photo-label-wrap{position:absolute; z-index:6;}
  .label-toolbar{position:absolute; top:-24px; left:0; display:flex; align-items:center; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:2px; box-shadow:0 2px 6px rgba(0,0,0,.15); white-space:nowrap;}
  .label-drag{cursor:grab; padding:2px 5px; color:var(--ink-soft); font-size:12px; user-select:none;}
  .label-drag:active{cursor:grabbing;}
  .label-toolbar button{border:none; background:none; color:var(--ink); font-size:11px; padding:2px 6px; cursor:pointer; border-radius:4px; font-family:var(--sans);}
  .label-toolbar button:hover{background:var(--bg);}
  .label-toolbar .label-del:hover{color:var(--danger);}
  .photo-label{background:#000; color:#fff; font-family:var(--sans); font-weight:600; white-space:pre-wrap; padding:0.5em 0.7em; border-radius:0.25em; line-height:1.35; box-shadow:0 2px 8px rgba(0,0,0,.35); outline:none; max-width:20em; min-width:1.4em; min-height:1em; text-align:center;}
  .photo-label:focus{box-shadow:0 0 0 2px var(--accent);}
  .label-resize{position:absolute; right:-5px; bottom:-5px; width:13px; height:13px; background:#fff; border:2px solid #000; border-radius:2px; cursor:nwse-resize; z-index:2;}
  .hint{font-size:12px; color:var(--ink-soft); margin-top:10px;}
  .legend{display:flex; flex-wrap:wrap; gap:6px; margin-top:14px;}

  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px;}
  .field input{width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:7px; font-size:14px; font-family:var(--sans); background:var(--bg); color:var(--ink);}
  .modal-backdrop{position:fixed; inset:0; background:rgba(20,20,18,.4); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:var(--surface); border-radius:14px; padding:22px; width:100%; max-width:380px;}
  .modal h3{margin:0 0 16px; font-size:16px;}
  .help-modal{max-width:520px; max-height:82vh; overflow-y:auto;}
  .help-intro{font-size:13px; color:var(--ink-soft); line-height:1.6; margin:-4px 0 16px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .help-list{margin:0; padding-left:18px; font-size:13.5px; line-height:1.6;}
  .help-list li{margin-bottom:10px;}
  .help-list ul{margin-top:6px; padding-left:16px;}
  .help-list ul li{margin-bottom:6px; font-size:13px; color:var(--ink-soft);}
  .help-list code{background:var(--bg); padding:1px 5px; border-radius:4px; font-family:var(--mono); font-size:12px;}
  .help-note{font-size:12px; color:var(--ink-soft); margin-top:14px; padding-top:12px; border-top:1px solid var(--line);}

  .access-modal{max-width:480px; max-height:82vh; overflow-y:auto;}
  .access-section{margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--line);}
  .access-section:last-of-type{border-bottom:none; margin-bottom:8px;}
  .access-section-title{font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px;}
  .access-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 0; font-size:13px;}
  .access-row span{font-family:var(--mono); font-size:12.5px; word-break:break-all;}
  .access-actions{display:flex; gap:6px; flex-shrink:0;}
  .access-empty{font-size:12.5px; color:var(--ink-soft); padding:6px 0;}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:16px;}
  .footer-note{font-size:11.5px; color:var(--ink-soft); margin-top:26px; border-top:1px solid var(--line); padding-top:14px;}

  .crop-modal{max-width:560px;}
  .crop-canvas-wrap{position:relative; width:100%; aspect-ratio:4/3; border-radius:10px; overflow:hidden; background:#111; border:1px solid var(--line); touch-action:none; user-select:none;}
  .crop-canvas-wrap canvas{display:block; width:100%; height:100%; pointer-events:none;}
  .crop-box{position:absolute; border:2px solid #fff; box-shadow:0 0 0 2000px rgba(0,0,0,.55); cursor:move;}
  .crop-handle{position:absolute; width:18px; height:18px; border:3px solid #fff; background:transparent;}
  .handle-nw{top:-3px; left:-3px; border-right:none; border-bottom:none; cursor:nwse-resize;}
  .handle-ne{top:-3px; right:-3px; border-left:none; border-bottom:none; cursor:nesw-resize;}
  .handle-sw{bottom:-3px; left:-3px; border-right:none; border-top:none; cursor:nesw-resize;}
  .handle-se{bottom:-3px; right:-3px; border-left:none; border-top:none; cursor:nwse-resize;}
  .crop-edge-handle{position:absolute; background:rgba(255,255,255,.9); border:1px solid rgba(0,0,0,.3); border-radius:3px;}
  .edge-n{top:-4px; left:50%; width:36px; height:8px; transform:translateX(-50%); cursor:ns-resize;}
  .edge-s{bottom:-4px; left:50%; width:36px; height:8px; transform:translateX(-50%); cursor:ns-resize;}
  .edge-w{left:-4px; top:50%; width:8px; height:36px; transform:translateY(-50%); cursor:ew-resize;}
  .edge-e{right:-4px; top:50%; width:8px; height:36px; transform:translateY(-50%); cursor:ew-resize;}
  .crop-dim-label{position:absolute; left:50%; bottom:8px; transform:translateX(-50%); background:rgba(0,0,0,.7); color:#fff; font-size:11px; font-family:var(--mono); padding:3px 9px; border-radius:5px; white-space:nowrap; pointer-events:none;}

<body>

  <div class="login-gate-box" id="gateContent">
    <div class="brand" style="justify-content:center; pointer-events:none;">RED BUTTON<span class="r-mark">®</span></div>

<div id="appRoot" style="display:none;">
  <div class="topbar">
    <button class="brand" onclick="closeGame()" aria-label="게임 목록으로 이동">RED BUTTON<span class="r-mark">®</span><span class="sub">오거나이징 가이드</span></button>
    <div class="search"><input id="searchInput" placeholder="게임 이름 검색 (초성 가능, 예: ㅋㅅㅋㄷㅇ)"></div>

    <button class="btn btn-ghost" onclick="showHelpModal()">이용 방법</button>

  </div>

  <main id="app"></main>
  <div id="toast"></div>
</div>

<script>
const CASE_TYPES = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const CASE_SIZES = {A:'65x65x30',B:'90x65x30',C:'90x90x30',D:'105x105x35',E:'105x150x35',F:'150x150x35',
  G:'185x85x45',H:'185x125x45',I:'188x105x18',J:'220x150x45',K:'250x180x50',L:'300x220x60'};

let role = 'viewer';
let currentGameId = null;
let currentMode = '1';
let currentPhotoIdx = 0;
let searchQuery = '';
let games = [];
let draggingMarker = null;
let expandedCaseNotes = new Set();
let draggingBox = null;
let dragMarkerOffset = null;
let dragBoxOffset = null;
let draggingLabel = null;
let dragLabelOffset = null;
let resizingLabel = null;
let resizeLabelStart = null;
let authToken = null;   // 구글 ID 토큰 (로그인 시 발급됨)
let authEmail = null;   // 로그인된 사용자 이메일
const _measureCanvas = document.createElement('canvas');

/**
 * 입력창의 실제 글자 폭을 측정해서 그만큼 너비를 넓혀줍니다.
 * (CSS만으로는 브라우저마다 자동 크기 조절이 불안정해서, 직접 측정하는 방식을 씁니다)
 */
function autoSizeTextInput(inp){
  const style = getComputedStyle(inp);
  const font = `${style.fontStyle} ${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
  const ctx = _measureCanvas.getContext('2d');
  ctx.font = font;
  const textWidth = ctx.measureText(inp.value || '').width;
  const min = 50, max = 220;
  inp.style.width = Math.min(max, Math.max(min, textWidth + 22)) + 'px';
}

function showToast(message, type='info'){
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-msg' + (type==='error' ? ' error' : '');
  el.textContent = message;
  container.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=> el.remove(), 250);
  }, 4000);
}

// 배포된 Apps Script 웹앱 URL
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz7Bwa0gOb5R2W_TBqUlHNjfTKAcu5CjbfAjR_0XVKvYr376gNLbq240FfopNuw6W8/exec';
// 구글 클라우드 콘솔에서 발급받은 OAuth 클라이언트 ID
const GOOGLE_CLIENT_ID = '674971767762-cimv1024n7u11stknpnbbq81lf2djaor.apps.googleusercontent.com';

const SEED = [
  { id:'487', name:'캐스캐디아',
    cases:[
      {caseType:'D', items:[{name:'지형 타일', qty:2}]},
      {caseType:'B', items:[{name:'시작타일 5개, 지형타일', qty:1}]},
      {caseType:'A', items:[{name:'솔방울토큰', qty:1}]},
      {caseType:'G', items:[{name:'주머니', qty:1},{name:'원형 토큰', qty:1}]},
      {caseType:'I', items:[{name:'점수 기록지', qty:1},{name:'볼펜', qty:1}]}
    ],
    photos:[
      { markers:[{x:22,y:28,caseIdx:0},{x:58,y:22,caseIdx:1},{x:30,y:62,caseIdx:2}] },
      { markers:[{x:72,y:55,caseIdx:3},{x:50,y:80,caseIdx:4}] }
    ]
  },
  { id:'112', name:'윙스팬',
    cases:[
      {caseType:'F', items:[{name:'새 카드', qty:170}]},
      {caseType:'C', items:[{name:'먹이 토큰', qty:60}]},
      {caseType:'B', items:[{name:'알 토큰', qty:75}]}
    ],
    photos:[
      { markers:[{x:35,y:35,caseIdx:0},{x:65,y:40,caseIdx:1},{x:50,y:70,caseIdx:2}] }
    ]
  },
  { id:'203', name:'스플렌더',
    cases:[
      {caseType:'A', items:[{name:'보석 토큰', qty:40}]},
      {caseType:'C', items:[{name:'발전 카드', qty:90}]}
    ],
    photos:[ { markers:[{x:40,y:40,caseIdx:0},{x:60,y:60,caseIdx:1}] } ]
  }
];

const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(str){
  let out='';
  for (const ch of str){
    const code = ch.charCodeAt(0) - 0xAC00;
    out += (code>=0 && code<=11171) ? CHO[Math.floor(code/588)] : ch;
  }
  return out;
}

async function loadGames(){
  if (WEB_APP_URL === 'YOUR_WEB_APP_URL'){
    console.warn('WEB_APP_URL이 설정되지 않아 데모 데이터로 동작합니다.');
    games = SEED;
    return;
  }
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'listGames', idToken: authToken })
    });
    const data = await res.json();
    if (data.success === false){
      // 로그인이 만료됐거나 유효하지 않음 → 다시 로그인 화면으로
      clearCachedAuthToken();
      showGate();
      showToast('로그인이 만료되었습니다. 다시 로그인해주세요.', 'error');
      return;
    }
    games = (data.games && data.games.length) ? data.games : SEED;
  }catch(e){
    console.error('불러오기 실패, 데모 데이터로 대체합니다.', e);
    games = SEED;
  }
}

/**
 * 게임 하나만 서버에 저장합니다. (전체 목록을 통째로 덮어쓰지 않음)
 * 여러 편집자가 서로 다른 게임을 동시에 작업해도 서로의 저장을 덮어쓰지 않도록 하기 위함입니다.
 */
async function saveGames(gameId){
  gameId = gameId || currentGameId;
  if (!gameId){ console.warn('저장할 게임을 특정할 수 없습니다.'); return; }
  if (WEB_APP_URL === 'YOUR_WEB_APP_URL') return; // 데모 모드에서는 저장 생략

  const game = games.find(x=>x.id===gameId);
  if (!game){ console.warn('저장할 게임을 찾지 못했습니다:', gameId); return; }

  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // CORS 프리플라이트 회피용
      body: JSON.stringify({ action:'saveGame', idToken:authToken, game })
    });
    const result = await res.json();
    if (result.success){
      cacheAuthToken(authToken, authEmail); // 저장이 잘 되면 로그인 세션 갱신
      cacheEditorApproval();                // 편집자 승인 캐시도 10분 연장
    } else {
      showToast('저장 실패: 로그인 상태를 확인해주세요. (' + (result.error||'') + ')', 'error');
      if (result.error === 'NOT_APPROVED'){ clearCachedAuthToken(); clearCachedEditorApproval(); }
    }
  }catch(e){
    console.error('저장 실패', e);
    showToast('서버에 연결하지 못했습니다. 네트워크 상태 또는 설정을 확인해주세요.', 'error');
  }
}

/**
 * 게임을 서버에서 완전히 삭제합니다.
 */
async function deleteGameOnServer(gameId){
  if (WEB_APP_URL === 'YOUR_WEB_APP_URL') return;
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'deleteGame', idToken:authToken, gameId })
    });
    const result = await res.json();
    if (!result.success){
      showToast('삭제 실패: ' + (result.error||''), 'error');
    }
  }catch(e){
    console.error('삭제 실패', e);
    showToast('서버에 연결하지 못했습니다.', 'error');
  }
}

async function refreshGames(){
  showToast('불러오는 중...');
  await loadGames();
  render();
  showToast('최신 데이터를 불러왔습니다.');
}

function render(){
  const app = document.getElementById('app');
  const isEditor = role==='editor';
  document.getElementById('newGameBtn').style.display = isEditor ? 'inline-block' : 'none';
  document.getElementById('accessBtn').style.display = isEditor ? 'inline-block' : 'none';
  currentGameId ? renderDetail(app) : renderList(app);
}

let selectedGameIds = new Set();

function renderList(app){
  const filtered = games.filter(g=>{
    if(!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return g.name.toLowerCase().includes(q) || getChosung(g.name).includes(searchQuery) || g.id.includes(searchQuery);
  });
  const editable = role==='editor';
  let html = '';

  if (selectedGameIds.size > 0) html += renderSelectionSummary();

  if (filtered.length===0){
    html += `<div class="empty">검색 결과가 없습니다.</div>`;
  } else {
    html += `<div class="grid">`;
    filtered.forEach(g=>{
      const counts = {};
      g.cases.forEach(c=>{ counts[c.caseType] = (counts[c.caseType]||0) + 1; });
      const types = Object.keys(counts);
      const checked = selectedGameIds.has(g.id);
      html += `<div class="card" onclick="openGame('${g.id}')">
        <div class="card-top">
          <input type="checkbox" class="card-select" ${checked?'checked':''} onclick="event.stopPropagation();" onchange="toggleGameSelect('${g.id}')" title="선택해서 필요 케이스 모아보기">
          <div class="card-id">ID ${g.id}</div>
          ${editable ? `<button class="card-delete" onclick="event.stopPropagation(); deleteGame('${g.id}')" title="게임 삭제">✕</button>` : ''}
        </div>
        <div class="card-name">${g.name}</div>
        <div class="card-badges">${types.map(t=>`<span class="chip case-${t}"><span class="dot"></span>${t}${counts[t]>1?`x${counts[t]}`:''}</span>`).join('')}</div>
      </div>`;
    });
    html += `</div>`;
  }
  app.innerHTML = html;
}

function toggleGameSelect(id){
  if (selectedGameIds.has(id)) selectedGameIds.delete(id);
  else selectedGameIds.add(id);
  render();
}

function clearSelection(){
  selectedGameIds.clear();
  render();
}

function renderSelectionSummary(){
  const selected = games.filter(g=>selectedGameIds.has(g.id));
  const counts = {};
  selected.forEach(g=> g.cases.forEach(c=>{ counts[c.caseType] = (counts[c.caseType]||0) + 1; }));
  const types = Object.keys(counts).sort();

  return `<div class="selection-panel">
    <div class="selection-head">
      <span>${selected.length}개 게임 선택됨 · 필요한 케이스 합계</span>
      <button class="btn btn-ghost" style="padding:4px 10px; font-size:12px;" onclick="clearSelection()">선택 해제</button>
    </div>
    <div class="selection-games">
      ${selected.map(g=>`<span class="sel-chip">${g.name}<button onclick="toggleGameSelect('${g.id}')">✕</button></span>`).join('')}
    </div>
    <div class="selection-totals">
      ${types.length
        ? types.map(t=>`<span class="case-badge case-${t}"><span class="dot"></span>${t}<span class="size-label">${counts[t]}개</span></span>`).join('')
        : '<span style="color:var(--ink-soft); font-size:13px;">선택한 게임에 등록된 케이스가 없습니다.</span>'}
    </div>
  </div>`;
}

function deleteGame(id){
  const g = games.find(x=>x.id===id);
  if (!g) return;
  if (!confirm(`"${g.name}" 게임을 삭제할까요? 이 작업은 되돌릴 수 없습니다.`)) return;
  games = games.filter(x=>x.id!==id);
  deleteGameOnServer(id);
  render();
}

function renderDetail(app){
  const g = games.find(x=>x.id===currentGameId);
  if (!g){ currentGameId=null; renderList(app); return; }
  if (!g.photos || g.photos.length===0) g.photos = [{markers:[]}];
  if (currentPhotoIdx >= g.photos.length) currentPhotoIdx = 0;

  let html = `
    <button class="back" onclick="closeGame()">← 목록으로</button>
    <div class="detail-head">
      <div>
        <div class="detail-title">${g.name}</div>
        <div class="detail-id">ID ${g.id}</div>
      </div>
      <div class="game-note-area">${renderGameNote_(g)}</div>
    </div>
    <div class="tabs">
      <button class="${currentMode==='1'?'active':''}" onclick="setMode('1')">사진</button>
      <button class="${currentMode==='2'?'active':''}" onclick="setMode('2')">표</button>
    </div>
  `;
  html += currentMode==='2' ? renderTablePanel(g) : renderPhotoPanel(g);
  html += `<div class="footer-note">데모 안내 · 실제 사진 대신 자리표시(placeholder)를 사용했습니다. 실 서비스에서는 드라이브에 업로드된 실제 배치 사진이 표시됩니다.</div>`;
  app.innerHTML = html;
  if (currentMode==='1') attachPhotoHandlers(g);
}

function renderTablePanel(g){
  const editable = role==='editor';
  let rows='';
  g.cases.forEach((c,ci)=>{
    c.items.forEach((item,ii)=>{
      const isLastOfCase = ii === c.items.length-1;
      rows += `<tr class="${isLastOfCase ? 'case-end' : ''}">`;
      if (ii===0){
        rows += `<td rowspan="${c.items.length}" class="type-col">
          ${editable ? caseSelectHtml(c.caseType,ci) : `<span class="case-badge case-${c.caseType}"><span class="dot"></span>${c.caseType}<span class="size-label">${CASE_SIZES[c.caseType]}mm</span></span>`}
        </td>`;
      }
      const qtyDisplay = editable
        ? `<input type="number" value="${item.qty}" onchange="updateItem(${ci},${ii},'qty',this.value)">`
        : (Number(item.qty)===0 ? '<span style="color:var(--ink-soft); font-size:12px;">수량 체크 X</span>' : item.qty);
      rows += `
        <td>${editable ? `<input value="${item.name}" onchange="updateItem(${ci},${ii},'name',this.value)">` : item.name}</td>
        <td class="qty-col">${qtyDisplay}</td>`;
      if (ii===0){
        rows += `<td rowspan="${c.items.length}" class="note-col">
          ${editable ? `<input value="${c.note||''}" placeholder="비고 (선택)" onchange="updateCaseNote(${ci}, this.value)">` : (c.note ? `<span style="color:var(--ink-soft); font-size:12.5px;">${c.note}</span>` : '')}
        </td>`;
      }
      rows += `${editable ? `<td style="width:32px;"><button class="row-del" onclick="deleteItem(${ci},${ii})">✕</button></td>` : ''}
      </tr>`;
    });
  });
  return `<div class="panel">
    <div class="panel-label"><span>구성표</span>${editable?`<button class="add-row" onclick="addCase()">+ 케이스 추가</button>`:''}</div>
    <div class="table-scroll">
      <table><thead><tr><th>제품종류</th><th>구성품</th><th>수량</th><th>비고</th>${editable?'<th></th>':''}</tr></thead>
      <tbody>${rows || '<tr><td colspan="5" style="color:var(--ink-soft);">등록된 구성품이 없습니다.</td></tr>'}</tbody></table>
    </div>
  </div>`;
}
function caseSelectHtml(current, ci){
  return `<select onchange="updateCaseType(${ci}, this.value)">
    ${CASE_TYPES.map(t=>`<option value="${t}" ${t===current?'selected':''}>${t} · ${CASE_SIZES[t]}mm</option>`).join('')}
  </select>`;
}

function renderPhotoPanel(g){
  const editable = role==='editor';
  const total = g.photos.length;
  const photo = g.photos[currentPhotoIdx];
  const dots = g.photos.map((_,i)=>`<button class="${i===currentPhotoIdx?'active':''}" onclick="goToPhoto(${i})" aria-label="사진 ${i+1}"></button>`).join('');
  const hasImage = !!photo.imageUrl;
  return `<div class="panel">
    <div class="panel-label">
      <span>박스 배치 가이드</span>
      ${editable ? `<button class="add-row" onclick="addPhoto()">+ 사진 페이지 추가</button>` : ''}
    </div>
    <div class="photo-pager">
      <button class="pager-btn" onclick="prevPhoto()" ${currentPhotoIdx===0?'disabled':''}>‹</button>
      <span class="photo-count">사진 ${currentPhotoIdx+1} / ${total}</span>
      <div class="pager-dots">${dots}</div>
      <button class="pager-btn" onclick="nextPhoto()" ${currentPhotoIdx===total-1?'disabled':''}>›</button>
      ${editable && total>1 ? `<button class="btn btn-ghost" style="margin-left:auto; padding:5px 10px; font-size:12px;" onclick="deletePhoto(${currentPhotoIdx})">이 사진 삭제</button>` : ''}
    </div>
    ${editable ? `
      <div class="photo-actions">
        <input type="file" id="photoFileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
        <button class="btn btn-ghost" onclick="document.getElementById('photoFileInput').click()">📷 사진 업로드</button>
        <button class="btn btn-ghost" onclick="autoGenerateMarkers()" title="표에 있지만 사진에 마커가 없는 케이스를 자동으로 배치합니다">📍 표 기준 마커 자동 생성</button>
        <div class="marker-size-control" style="margin-left:auto;">
          <label>마커 크기</label>
          <input type="range" min="16" max="44" value="${g.markerSize||24}" oninput="previewMarkerSize(this.value)" onchange="updateMarkerSize(this.value)">
        </div>
      </div>
      <div class="hint" style="margin-top:-4px;">또는 아래 사진 영역에 파일을 끌어다 놓으세요</div>` : ''}
    <div class="photo-stage ${hasImage?'':'no-image'}" id="photoStage" style="--marker-size:${g.markerSize||24}px;">
      ${hasImage
        ? `<img class="stage-img" id="stageImg" src="${photo.imageUrl}" onerror="handleStageImgError(this)">`
        : '<div class="ph-label">사진 없음 · 편집자 모드에서 업로드하세요</div>'}
      <svg id="lineLayer" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;"></svg>
      <div id="markerLayer"></div>
      <div id="boxLayer"></div>
      <div id="labelLayer"></div>
      <div id="uploadOverlay" class="upload-overlay" style="display:none;">업로드 중...</div>
    </div>
    <div class="hint">${editable ? '마커를 드래그해 위치를 옮기고, 박스에서 케이스종류·구성품·수량을 바로 수정할 수 있습니다. 사진의 빈 곳을 클릭하면 새 마커가 추가됩니다. "라벨" 버튼을 누르면 실제 라벨 인쇄 모습을 미리 볼 수 있는 검정 박스가 생깁니다.' : '점이 표시된 위치에 해당 구성품이 담긴 케이스를 배치하세요.'}</div>
    ${editable && hasImage ? `<div class="hint">사진: <a href="${photo.imageUrl}" target="_blank" rel="noopener" style="color:var(--accent); font-weight:700;">새 탭에서 원본 보기 ↗</a></div>` : ''}
    ${editable && !hasImage ? `<div class="hint">이 사진 페이지에는 아직 업로드된 이미지가 없습니다.</div>` : ''}
    <div class="legend" id="photoLegend"></div>
  </div>`;
}

function handleStageImgError(imgEl){
  console.error('이미지 로드 실패:', imgEl.src);
  const stage = imgEl.closest('.photo-stage');
  imgEl.remove();
  if (stage){
    stage.classList.add('no-image');
    const label = document.createElement('div');
    label.className = 'ph-label';
    label.style.color = 'var(--danger)';
    label.textContent = '이미지를 불러오지 못했습니다 (링크 접근 오류) · 콘솔에서 URL 확인 가능';
    stage.prepend(label);
  }
  showToast('사진을 불러오지 못했습니다. URL 접근 권한 문제일 수 있습니다.', 'error');
}

function attachPhotoHandlers(g){
  const stage = document.getElementById('photoStage');
  const lineLayer = document.getElementById('lineLayer');
  const markerLayer = document.getElementById('markerLayer');
  const boxLayer = document.getElementById('boxLayer');
  const labelLayer = document.getElementById('labelLayer');
  const legendEl = document.getElementById('photoLegend');
  const editable = role==='editor';
  const photo = g.photos[currentPhotoIdx];
  if (!photo.labels) photo.labels = [];

  function layoutAutoBoxes(){
    const h = stage.clientHeight;
    const left=[], right=[];
    photo.markers.forEach((m,idx)=>{
      if (m.box) return; // 수동으로 옮긴 박스는 자동 배치 계산에서 제외
      (m.x<50?left:right).push({m,idx});
    });
    left.sort((a,b)=>a.m.y-b.m.y); right.sort((a,b)=>a.m.y-b.m.y);
    const pos = {};
    const gapL = Math.max(56, (h*0.92)/Math.max(left.length,1));
    left.forEach((e,i)=>pos[e.idx]={side:'left', top:24+i*gapL});
    const gapR = Math.max(56, (h*0.92)/Math.max(right.length,1));
    right.forEach((e,i)=>pos[e.idx]={side:'right', top:24+i*gapR});
    return pos;
  }

  let currentUiScale = 1;

  function draw(){
    const w = stage.clientWidth, h = stage.clientHeight;
    // 텍스트박스/마커: 너무 작아져서 편집이 불편해지지 않도록 최소 50%는 유지
    const uiScale = Math.max(0.5, Math.min(1, w / 650));
    currentUiScale = uiScale;
    stage.style.setProperty('--ui-scale', uiScale);
    stage.style.setProperty('--marker-size', Math.round((g.markerSize||24) * uiScale) + 'px');
    const autoPos = layoutAutoBoxes();
    markerLayer.innerHTML=''; boxLayer.innerHTML=''; lineLayer.innerHTML='';
    let legendHtml = '';

    photo.markers.forEach((m, idx)=>{
      const c = g.cases[m.caseIdx];
      if (!c) return;
      const mx = w*m.x/100, my = h*m.y/100;

      const el = document.createElement('div');
      el.className = `marker case-${c.caseType} ${editable?'editable':''}`;
      el.style.left = mx+'px'; el.style.top = my+'px';
      el.textContent = c.caseType;
      if (editable) el.addEventListener('pointerdown', e=>{
        draggingMarker = idx;
        const elRect = el.getBoundingClientRect();
        dragMarkerOffset = { dx: e.clientX - (elRect.left+elRect.width/2), dy: e.clientY - (elRect.top+elRect.height/2) };
        e.stopPropagation();
      });
      markerLayer.appendChild(el);

      // 박스 위치: 수동으로 옮긴 적 있으면 그 좌표, 없으면 자동 좌/우 정렬
      let boxLeftPx, boxTopPx, side = null;
      if (m.box){
        boxLeftPx = w * m.box.x/100;
        boxTopPx = h * m.box.y/100;
      } else {
        const p = autoPos[idx] || {side:'left', top:24};
        side = p.side;
        boxTopPx = p.top;
      }

      const box = document.createElement('div');
      box.className = 'anno-box case-'+c.caseType + (editable ? ' draggable' : ' readonly');
      box.style.top = boxTopPx+'px';
      if (m.box){
        box.style.left = boxLeftPx+'px';
      } else {
        box.style[side] = '10px';
      }

      if (editable){
        box.innerHTML = `
          <div class="anno-head">
            <select onchange="updateCaseType(${m.caseIdx}, this.value)">
              ${CASE_TYPES.map(t=>`<option value="${t}" ${t===c.caseType?'selected':''}>${t}</option>`).join('')}
            </select>
            <span style="font-size:10px; color:var(--ink-soft);">${CASE_SIZES[c.caseType]}mm</span>
            <button class="anno-label-btn" onclick="createLabelFromCase(${idx})" title="실제 라벨 인쇄 모습 미리보기 생성">라벨</button>
            ${m.box ? `<button class="anno-remove" onclick="resetBoxPosition(${idx})" title="자동 위치로 되돌리기">↺</button>` : ''}
            <button class="anno-remove" onclick="removeMarkerCase(${idx})" title="마커 삭제">✕</button>
          </div>
          ${c.items.map((item,ii)=>`
            <div class="anno-item">
              <input type="text" value="${item.name}" size="${Math.min(26, Math.max(6, (item.name||'').length + 1))}" onchange="updateItem(${m.caseIdx},${ii},'name',this.value)">
              <input type="number" value="${item.qty}" onchange="updateItem(${m.caseIdx},${ii},'qty',this.value)">
              <button onclick="deleteItemRedraw(${m.caseIdx},${ii})">✕</button>
            </div>`).join('')}
          <button class="anno-additem" onclick="addItemRedraw(${m.caseIdx})">+ 항목 추가</button>
          ${(c.note && c.note.length>0) || expandedCaseNotes.has(m.caseIdx) ? `
            <div class="anno-note-row">
              <textarea class="anno-note" placeholder="비고 (예: 카드 프로텍터 기준 / 코인 캡슐 사용)" onchange="updateCaseNote(${m.caseIdx}, this.value)">${c.note||''}</textarea>
            </div>
          ` : `<button class="anno-note-add" onclick="expandCaseNote(${m.caseIdx})">+ 비고</button>`}
        `;
        box.querySelectorAll('.anno-item input[type=text]').forEach(inp=>{
          autoSizeTextInput(inp);
          inp.addEventListener('input', ()=> autoSizeTextInput(inp));
        });
        box.addEventListener('pointerdown', e=>{
          if (['INPUT','SELECT','BUTTON','OPTION'].includes(e.target.tagName)) return;
          draggingBox = idx;
          const boxRect = box.getBoundingClientRect();
          dragBoxOffset = { dx: e.clientX - boxRect.left, dy: e.clientY - (boxRect.top + boxRect.height/2) };
          e.stopPropagation();
        });
      } else {
        box.innerHTML = `<span class="case-badge case-${c.caseType}"><span class="dot"></span>${c.caseType}<span class="size-label">${CASE_SIZES[c.caseType]}mm</span></span><div style="margin-top:${(7*uiScale).toFixed(1)}px; font-size:${(12.5*uiScale).toFixed(1)}px; line-height:1.6;">${c.items.map(i=> Number(i.qty)===0 ? i.name : `${i.name} ${i.qty}개`).join('<br>')}</div>${c.note ? `<div class="anno-note-view" style="font-size:${(11*uiScale).toFixed(1)}px;">📝 ${c.note}</div>` : ''}`;
      }
      boxLayer.appendChild(box);

      const bx = m.box ? boxLeftPx : (side==='left' ? 10 : w-10);
      const by = boxTopPx;
      const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',mx); ln.setAttribute('y1',my);
      ln.setAttribute('x2',bx); ln.setAttribute('y2',by);
      ln.setAttribute('class','annot-line');
      const colorVar = getComputedStyle(el).getPropertyValue('--c') || '#333';
      ln.setAttribute('style', `stroke:${colorVar}; stroke-width:${(3.2*uiScale).toFixed(2)};`);
      lineLayer.appendChild(ln);

      legendHtml += `<span class="chip case-${c.caseType}"><span class="dot"></span>${c.caseType} · ${c.items.map(i=>i.name).join(', ')}</span>`;
    });

    legendEl.innerHTML = legendHtml;
  }

  function drawLabels(){
    const w = stage.clientWidth, h = stage.clientHeight;
    labelLayer.innerHTML = '';

    photo.labels.forEach((lbl, li) => {
      // 구버전 호환: 예전엔 절대 px(fontSize/width/height, 기준폭 650px)로 저장했음 → % 값으로 환산
      const fsPct = lbl.fontSizePct != null ? lbl.fontSizePct : ((lbl.fontSize || 14) / 650 * 100);
      const wPct = lbl.widthPct != null ? lbl.widthPct : (lbl.width != null ? lbl.width / 650 * 100 : null);
      const hPct = lbl.heightPct != null ? lbl.heightPct : (lbl.height != null ? lbl.height / 487.5 * 100 : null);

      const wrap = document.createElement('div');
      wrap.className = 'photo-label-wrap';
      wrap.style.left = (w*lbl.x/100)+'px';
      wrap.style.top = (h*lbl.y/100)+'px';

      const labelEl = document.createElement('div');
      labelEl.className = 'photo-label';
      // 화면 폭(w)의 %로 직접 계산 → 데스크톱/모바일 어디서든 사진 대비 정확히 같은 비율
      labelEl.style.fontSize = (w * fsPct / 100) + 'px';
      if (lbl.sized && wPct != null && hPct != null){
        labelEl.style.width = (w * wPct / 100) + 'px';
        labelEl.style.height = (h * hPct / 100) + 'px';
        labelEl.style.overflow = 'hidden';
      }
      labelEl.textContent = lbl.text;

      if (editable){
        labelEl.contentEditable = 'true';
        labelEl.addEventListener('blur', ()=>{
          lbl.text = labelEl.innerText;
          saveGames();
        });

        const toolbar = document.createElement('div');
        toolbar.className = 'label-toolbar';
        toolbar.innerHTML = `
          <span class="label-drag" title="이동">⠿</span>
          <button title="글자 작게" onclick="changeLabelFontSize(${li},-1)">A-</button>
          <button title="글자 크게" onclick="changeLabelFontSize(${li},1)">A+</button>
          <button class="label-del" title="삭제" onclick="deleteLabel(${li})">✕</button>
        `;
        toolbar.querySelector('.label-drag').addEventListener('pointerdown', e=>{
          draggingLabel = li;
          const wrapRect = wrap.getBoundingClientRect();
          dragLabelOffset = { dx: e.clientX - wrapRect.left, dy: e.clientY - wrapRect.top };
          e.stopPropagation();
        });
        wrap.appendChild(toolbar);

        const resizeHandle = document.createElement('div');
        resizeHandle.className = 'label-resize';
        resizeHandle.addEventListener('pointerdown', e=>{
          resizingLabel = li;
          const labelRect = labelEl.getBoundingClientRect();
          resizeLabelStart = {
            startX: e.clientX, startY: e.clientY,
            startW: labelRect.width, startH: labelRect.height,
            startFontSizePct: fsPct
          };
          e.stopPropagation();
          e.preventDefault();
        });
        wrap.appendChild(labelEl);
        wrap.appendChild(resizeHandle);
      } else {
        wrap.appendChild(labelEl);
      }

      labelLayer.appendChild(wrap);
    });
  }

  draw();
  drawLabels();

  if (editable){
    stage.onpointermove = e=>{
      if (draggingMarker===null && draggingBox===null && draggingLabel===null && resizingLabel===null) return;
      const rect = stage.getBoundingClientRect();
      if (draggingMarker!==null){
        const cx = e.clientX - dragMarkerOffset.dx;
        const cy = e.clientY - dragMarkerOffset.dy;
        let x=(cx-rect.left)/rect.width*100, y=(cy-rect.top)/rect.height*100;
        x=Math.max(3,Math.min(97,x)); y=Math.max(3,Math.min(97,y));
        photo.markers[draggingMarker].x=x; photo.markers[draggingMarker].y=y;
        draw();
      } else if (draggingBox!==null){
        const cx = e.clientX - dragBoxOffset.dx;
        const cy = e.clientY - dragBoxOffset.dy;
        let x=(cx-rect.left)/rect.width*100, y=(cy-rect.top)/rect.height*100;
        x=Math.max(0,Math.min(100,x)); y=Math.max(0,Math.min(100,y));
        photo.markers[draggingBox].box = {x, y};
        draw();
      } else if (draggingLabel!==null){
        const cx = e.clientX - dragLabelOffset.dx;
        const cy = e.clientY - dragLabelOffset.dy;
        let x=(cx-rect.left)/rect.width*100, y=(cy-rect.top)/rect.height*100;
        x=Math.max(0,Math.min(98,x)); y=Math.max(0,Math.min(98,y));
        photo.labels[draggingLabel].x = x; photo.labels[draggingLabel].y = y;
        drawLabels();
      } else if (resizingLabel!==null){
        const lbl = photo.labels[resizingLabel];
        const dx = e.clientX - resizeLabelStart.startX;
        const dy = e.clientY - resizeLabelStart.startY;
        const newW = Math.max(20, resizeLabelStart.startW + dx);
        const newH = Math.max(14, resizeLabelStart.startH + dy);
        const scale = Math.max(newW/resizeLabelStart.startW, newH/resizeLabelStart.startH);
        // 화면 폭(w)/높이(h) 대비 %로 저장 → 어떤 화면 크기에서도 항상 사진과 같은 비율로 재계산됨
        lbl.widthPct = (newW / rect.width) * 100;
        lbl.heightPct = (newH / rect.height) * 100;
        lbl.sized = true;
        lbl.fontSizePct = Math.max(0.4, Math.min(20, resizeLabelStart.startFontSizePct * scale));
        delete lbl.width; delete lbl.height; delete lbl.fontSize; // 구버전 필드 정리
        drawLabels();
      }
    };
    window.onpointerup = ()=>{
      if (draggingMarker!==null || draggingBox!==null){
        draggingMarker=null; draggingBox=null; dragMarkerOffset=null; dragBoxOffset=null; saveGames();
      }
      if (draggingLabel!==null || resizingLabel!==null){
        draggingLabel=null; resizingLabel=null; dragLabelOffset=null; resizeLabelStart=null; saveGames();
      }
    };
    stage.onclick = e=>{
      if (e.target !== stage && e.target.id!=='markerLayer' && e.target.id!=='boxLayer' && e.target.id!=='stageImg') return;
      const rect = stage.getBoundingClientRect();
      const x=(e.clientX-rect.left)/rect.width*100, y=(e.clientY-rect.top)/rect.height*100;
      // 새 텍스트박스는 마커 바로 옆(화면 안쪽 방향)에 생성
      const boxX = x < 60 ? Math.min(97, x+10) : Math.max(3, x-10);
      const boxY = Math.max(5, Math.min(95, y-6));
      g.cases.push({caseType:'A', items:[{name:'새 구성품', qty:1}]});
      photo.markers.push({x, y, caseIdx:g.cases.length-1, box:{x:boxX, y:boxY}});
      saveGames();
      draw();
    };
    stage.addEventListener('dragover', e=>{ e.preventDefault(); stage.classList.add('dragover'); });
    stage.addEventListener('dragleave', ()=> stage.classList.remove('dragover'));
    stage.addEventListener('drop', e=>{
      e.preventDefault();
      stage.classList.remove('dragover');
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) openCropModal(file);
      else showToast('이미지 파일만 업로드할 수 있습니다.', 'error');
    });
  }
}

function handleFileSelect(e){
  const file = e.target.files[0];
  if (file) openCropModal(file);
  e.target.value = ''; // 같은 파일 다시 선택 가능하도록 초기화
}

/* ============================================================
   사진 크롭 편집창 (자유 드래그 방식 - 표준 포토 에디터 스타일)
   ============================================================ */
const CROP_OUTPUT_MAX = 1400; // 저장되는 이미지의 최대 가로/세로 길이
const CROP_MIN_BOX = 40; // 크롭 박스 최소 크기(렌더링 기준 px)
let cropState = null;
let cropDrag = null; // { mode: 'move'|'nw'|'ne'|'sw'|'se', startX, startY, startBox }

function openCropModal(file){
  if (WEB_APP_URL === 'YOUR_WEB_APP_URL'){
    showToast('WEB_APP_URL이 아직 설정되지 않아 업로드할 수 없습니다.', 'error');
    return;
  }
  if (!authToken){
    showToast('로그인이 확인되지 않았습니다. 편집자로 다시 로그인해주세요.', 'error');
    return;
  }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    cropState = { img, url };
    renderCropModal();
  };
  img.onerror = () => showToast('이미지를 불러오지 못했습니다.', 'error');
  img.src = url;
}

function renderCropModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'cropBackdrop';
  backdrop.innerHTML = `
    <div class="modal crop-modal">
      <h3>사진 자르기</h3>
      <div class="crop-canvas-wrap" id="cropWrap">
        <canvas id="cropCanvas"></canvas>
        <div class="crop-box" id="cropBox">
          <div class="shrink-preview" id="shrinkPreview"></div>
          <div class="crop-dim-label" id="cropDimLabel"></div>
          <div class="crop-handle handle-nw" data-h="nw"></div>
          <div class="crop-handle handle-ne" data-h="ne"></div>
          <div class="crop-handle handle-sw" data-h="sw"></div>
          <div class="crop-handle handle-se" data-h="se"></div>
          <div class="crop-edge-handle edge-n" data-h="n"></div>
          <div class="crop-edge-handle edge-s" data-h="s"></div>
          <div class="crop-edge-handle edge-w" data-h="w"></div>
          <div class="crop-edge-handle edge-e" data-h="e"></div>
        </div>
      </div>
      <div class="crop-hint">모서리나 변 중앙을 드래그해 원하는 영역만 선택하고, 박스 안쪽을 드래그하면 위치를 옮길 수 있습니다.</div>
      <div class="crop-shrink-row">
        <label>전체 축소</label>
        <input type="range" id="cropShrinkRange" min="40" max="100" value="100">
        <span id="cropShrinkVal">100%</span>
      </div>
      <div class="crop-hint">축소하면 선택한 영역이 그대로 작아지고, 남는 자리는 여백으로 채워집니다.</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="resetCropBox()">전체 선택으로 초기화</button>
        <button class="btn btn-ghost" onclick="cancelCropModal()">취소</button>
        <button class="btn btn-primary" onclick="applyCrop()">적용 · 업로드</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  // 실제 화면에 렌더링된 크기를 측정해서, 그 좌표계로 모든 계산을 통일합니다.
  // (CSS로 축소/확대되는 캔버스와 좌표 기준이 어긋나는 것을 방지)
  const wrap = document.getElementById('cropWrap');
  const canvas = document.getElementById('cropCanvas');
  const rect = wrap.getBoundingClientRect();
  const W = Math.max(100, Math.round(rect.width));
  const H = Math.max(100, Math.round(rect.height));
  canvas.width = W;
  canvas.height = H;

  const { img } = cropState;
  const containScale = Math.min(W/img.width, H/img.height);
  const dispW = img.width * containScale, dispH = img.height * containScale;
  const dispX = (W - dispW) / 2, dispY = (H - dispH) / 2;

  cropState.stageW = W;
  cropState.stageH = H;
  cropState.containScale = containScale;
  cropState.imgBounds = { x: dispX, y: dispY, w: dispW, h: dispH };
  cropState.box = { left: dispX, top: dispY, width: dispW, height: dispH }; // 처음엔 전체 선택
  cropState.shrinkPct = 100;

  drawCropImage();
  updateCropBoxUI();

  const cropBox = document.getElementById('cropBox');

  cropBox.addEventListener('pointerdown', e=>{
    if (e.target.classList.contains('crop-handle') || e.target.classList.contains('crop-edge-handle')) return;
    cropDrag = { mode:'move', startX:e.clientX, startY:e.clientY, startBox:{...cropState.box} };
    wrap.setPointerCapture(e.pointerId);
    e.stopPropagation();
  });

  cropBox.querySelectorAll('.crop-handle, .crop-edge-handle').forEach(handle=>{
    handle.addEventListener('pointerdown', e=>{
      cropDrag = { mode: handle.dataset.h, startX:e.clientX, startY:e.clientY, startBox:{...cropState.box} };
      wrap.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
  });

  wrap.addEventListener('pointermove', e=>{
    if (!cropDrag) return;
    const dx = e.clientX - cropDrag.startX;
    const dy = e.clientY - cropDrag.startY;
    updateCropBoxFromDrag(dx, dy);
  });
  wrap.addEventListener('pointerup', ()=>{ cropDrag = null; });
  wrap.addEventListener('pointerleave', ()=>{ cropDrag = null; });

  document.getElementById('cropShrinkRange').addEventListener('input', e=>{
    cropState.shrinkPct = Number(e.target.value);
    document.getElementById('cropShrinkVal').textContent = cropState.shrinkPct + '%';
    updateShrinkPreview();
  });
}

function updateCropBoxFromDrag(dx, dy){
  const { imgBounds } = cropState;
  const start = cropDrag.startBox;
  let { left, top, width, height } = start;
  const minB = imgBounds, maxX = imgBounds.x + imgBounds.w, maxY = imgBounds.y + imgBounds.h;

  if (cropDrag.mode === 'move'){
    left = start.left + dx; top = start.top + dy;
    left = Math.max(minB.x, Math.min(maxX - width, left));
    top = Math.max(minB.y, Math.min(maxY - height, top));
  } else {
    let right = start.left + start.width, bottom = start.top + start.height;
    if (cropDrag.mode.includes('w')) left = Math.min(right - CROP_MIN_BOX, Math.max(minB.x, start.left + dx));
    if (cropDrag.mode.includes('e')) right = Math.max(left + CROP_MIN_BOX, Math.min(maxX, right + dx));
    if (cropDrag.mode.includes('n')) top = Math.min(bottom - CROP_MIN_BOX, Math.max(minB.y, start.top + dy));
    if (cropDrag.mode.includes('s')) bottom = Math.max(top + CROP_MIN_BOX, Math.min(maxY, bottom + dy));
    width = right - left; height = bottom - top;
  }

  cropState.box = { left, top, width, height };
  updateCropBoxUI();
}

function updateCropBoxUI(){
  const box = document.getElementById('cropBox');
  if (!box) return;
  const { left, top, width, height } = cropState.box;
  box.style.left = left+'px'; box.style.top = top+'px';
  box.style.width = width+'px'; box.style.height = height+'px';

  const realW = Math.round(width / cropState.containScale);
  const realH = Math.round(height / cropState.containScale);
  document.getElementById('cropDimLabel').textContent = `${realW} x ${realH}`;

  updateShrinkPreview();
}

/**
 * "전체 축소" 슬라이더 값을 크롭 박스 안에 점선 사각형으로 실시간 미리보기합니다.
 */
function updateShrinkPreview(){
  const el = document.getElementById('shrinkPreview');
  if (!el || !cropState) return;
  const pct = (cropState.shrinkPct || 100) / 100;

  if (pct >= 1){
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  const insetPct = (1 - pct) / 2 * 100;
  el.style.left = insetPct + '%';
  el.style.top = insetPct + '%';
  el.style.width = (pct * 100) + '%';
  el.style.height = (pct * 100) + '%';
}

function resetCropBox(){
  const b = cropState.imgBounds;
  cropState.box = { left: b.x, top: b.y, width: b.w, height: b.h };
  updateCropBoxUI();
}

function drawCropImage(){
  const canvas = document.getElementById('cropCanvas');
  const ctx = canvas.getContext('2d');
  const { img, imgBounds, stageW, stageH } = cropState;
  ctx.clearRect(0,0,stageW,stageH);
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,stageW,stageH);
  ctx.drawImage(img, 0, 0, img.width, img.height, imgBounds.x, imgBounds.y, imgBounds.w, imgBounds.h);
}

function cancelCropModal(){
  const backdrop = document.getElementById('cropBackdrop');
  if (backdrop) backdrop.remove();
  if (cropState) URL.revokeObjectURL(cropState.url);
  cropState = null;
  cropDrag = null;
}

function applyCrop(){
  const { img, imgBounds, containScale, box } = cropState;

  // 미리보기 좌표계 -> 원본 이미지 좌표계로 변환
  const sx = (box.left - imgBounds.x) / containScale;
  const sy = (box.top - imgBounds.y) / containScale;
  const sW = box.width / containScale;
  const sH = box.height / containScale;

  const aspect = sW / sH;
  const outW = aspect >= 1 ? CROP_OUTPUT_MAX : Math.round(CROP_OUTPUT_MAX * aspect);
  const outH = aspect >= 1 ? Math.round(CROP_OUTPUT_MAX / aspect) : CROP_OUTPUT_MAX;

  const outCanvas = document.createElement('canvas');
  outCanvas.width = outW; outCanvas.height = outH;
  const ctx = outCanvas.getContext('2d');

  const shrink = (cropState.shrinkPct || 100) / 100;
  if (shrink < 1){
    ctx.fillStyle = '#F6F6F3';
    ctx.fillRect(0,0,outW,outH);
    const drawW = outW*shrink, drawH = outH*shrink;
    const drawX = (outW-drawW)/2, drawY = (outH-drawH)/2;
    ctx.drawImage(img, sx, sy, sW, sH, drawX, drawY, drawW, drawH);
  } else {
    ctx.drawImage(img, sx, sy, sW, sH, 0, 0, outW, outH);
  }

  const dataUrl = outCanvas.toDataURL('image/jpeg', 0.88);
  cancelCropModal();
  applyPhotoDataUrl(dataUrl);
}

/**
 * 사진을 data URI(base64) 형태로 게임 데이터에 바로 저장합니다.
 * 별도 업로드 서버 왕복 없이, 일반 저장(saveGames)과 동일하게 처리됩니다.
 */
async function applyPhotoDataUrl(dataUrl){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const overlay = document.getElementById('uploadOverlay');
  if (overlay) overlay.style.display = 'flex';

  photo.imageUrl = dataUrl;
  render();

  try{
    await saveGames();
    showToast('사진이 저장되었습니다.');
  }catch(err){
    console.error(err);
    showToast('사진 저장 중 오류가 발생했습니다.', 'error');
  }finally{
    if (overlay) overlay.style.display = 'none';
  }
}

}
function updateMarkerSize(v){

  g.markerSize = Number(v);
  saveGames();
}

function createLabelFromCase(markerIdxInCurrentPhoto){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  if (!photo.labels) photo.labels = [];
  const m = photo.markers[markerIdxInCurrentPhoto];
  const c = g.cases[m.caseIdx];
  if (!c) return;

  const text = c.items.map(i => Number(i.qty)===0 ? i.name : `${i.name} ${i.qty}개`).join('\n');
  const baseX = m.box ? m.box.x : m.x;
  const baseY = m.box ? m.box.y : m.y;

  photo.labels.push({
    x: Math.min(94, baseX + 6),
    y: Math.min(94, baseY + 8),
    text,
    fontSizePct: 2.15, // 화면 폭의 2.15% (기존 "650px 기준 14px" 디자인과 동일한 비율)
    sized: false
  });
  saveGames();
  render();
}

function deleteLabel(li){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  photo.labels.splice(li, 1);
  saveGames();
  render();
}

function changeLabelFontSize(li, delta){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const lbl = photo.labels[li];
  const current = lbl.fontSizePct != null ? lbl.fontSizePct : ((lbl.fontSize||14)/650*100);
  lbl.fontSizePct = Math.max(0.4, Math.min(20, current + delta*0.3));
  delete lbl.fontSize;
  saveGames();
  render();
}

 * 표(g.cases)에는 있지만 어떤 사진에도 마커가 없는 케이스들을,
 * 현재 보고 있는 사진 위에 격자 형태로 자동 배치합니다.
 */
function autoGenerateMarkers(){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];

  const placedCaseIdx = new Set();
  g.photos.forEach(p => (p.markers||[]).forEach(m => placedCaseIdx.add(m.caseIdx)));

  const missing = [];
  g.cases.forEach((c, ci) => { if (!placedCaseIdx.has(ci)) missing.push(ci); });

  if (missing.length === 0){
    showToast('이미 모든 케이스에 마커가 있습니다.');
    return;
  }

  const positions = computeGridPositions_(missing.length);
  missing.forEach((ci, i) => {
    photo.markers.push({ x: positions[i].x, y: positions[i].y, caseIdx: ci });
  });

  saveGames();
  render();
  showToast(missing.length + '개 마커를 자동 생성했습니다. 위치를 드래그해서 실제 배치에 맞게 옮겨주세요.');
}

function computeGridPositions_(count){
  const cols = Math.max(1, Math.ceil(Math.sqrt(count)));
  const rows = Math.max(1, Math.ceil(count / cols));
  const positions = [];
  for (let i = 0; i < count; i++){
    const col = i % cols, row = Math.floor(i / cols);
    const x = cols === 1 ? 50 : 12 + col * (76 / (cols - 1));
    const y = rows === 1 ? 50 : 12 + row * (76 / (rows - 1));
    positions.push({ x, y });
  }
  return positions;
}

function removeCaseEverywhere(g, caseIdx){
  g.cases.splice(caseIdx,1);
  g.photos.forEach(p=>{

  });
}

const AUTH_TTL_MS = 50 * 60 * 1000; // 구글 ID 토큰 유효시간(~1시간)보다 약간 짧게

function getCachedAuthToken(){
  try{
    const token = localStorage.getItem('authToken');
    const email = localStorage.getItem('authEmail');
    const ts = Number(localStorage.getItem('authTokenTime') || 0);
    if (token && email && (Date.now()-ts) < AUTH_TTL_MS) return { token, email };
  }catch(e){ /* localStorage 사용 불가 환경이면 그냥 매번 로그인 */ }
  return null;
}
function cacheAuthToken(token, email){
  try{
    localStorage.setItem('authToken', token);
    localStorage.setItem('authEmail', email);
    localStorage.setItem('authTokenTime', String(Date.now()));
  }catch(e){}
}
function clearCachedAuthToken(){
  try{
    localStorage.removeItem('authToken');
    localStorage.removeItem('authEmail');
    localStorage.removeItem('authTokenTime');
  }catch(e){}
  authToken = null; authEmail = null;
}

const EDITOR_APPROVAL_TTL_MS = 10 * 60 * 1000; // 10분

function getCachedEditorApproval(){
  try{
    const ts = Number(localStorage.getItem('editorApprovedAt') || 0);
    const savedEmail = localStorage.getItem('editorApprovedEmail');
    if (ts && savedEmail && savedEmail === authEmail && (Date.now()-ts) < EDITOR_APPROVAL_TTL_MS) return true;
  }catch(e){}
  return false;
}
function cacheEditorApproval(){
  try{
    localStorage.setItem('editorApprovedAt', String(Date.now()));
    localStorage.setItem('editorApprovedEmail', authEmail || '');
  }catch(e){}
}
function clearCachedEditorApproval(){
  try{
    localStorage.removeItem('editorApprovedAt');
    localStorage.removeItem('editorApprovedEmail');
  }catch(e){}
}

/**
 * "편집자" 버튼 클릭 시 호출됩니다.
 * 이미 로그인 게이트를 통과한 상태이므로, 새 팝업 없이 그 토큰으로 승인 여부만 확인합니다.
 * 10분 안에 이미 승인 확인이 됐다면 서버에 다시 묻지 않고 바로 전환합니다.
 */
async function enterEditorMode(){
  if (!authToken){ showGate(); return; }

  if (getCachedEditorApproval()){
    setRole('editor');
    return;
  }

  showToast('권한 확인 중...');
  const result = await requestEditorUpgradeOnServer(authToken);

  if (result.status === 'approved'){
    authEmail = result.email;
    cacheAuthToken(authToken, authEmail);
    cacheEditorApproval(); // 10분 창 시작(연장)
    setRole('editor');
    showToast('편집자로 전환되었습니다 (' + authEmail + ')');
  } else if (result.status === 'pending'){
    showToast(result.newRequest ? '편집자 권한 요청이 접수되었습니다. 승인을 기다려주세요.' : '아직 승인 대기 중입니다. 편집자에게 문의해주세요.', 'error');
  } else if (result.status === 'invalid_token'){
    showToast('로그인이 만료되었습니다. 다시 로그인해주세요.', 'error');
    clearCachedAuthToken();
    clearCachedEditorApproval();
    showGate();
  } else {
    showToast('권한 확인 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }
}

/**
 * 구글 로그인 스크립트(gsi/client)는 async로 로딩되기 때문에, 시크릿 창처럼
 * 캐시가 없어 느린 환경에서는 페이지가 그려질 때 아직 준비 안 됐을 수 있습니다.
 * 즉시 실패 처리하지 않고, 최대 5초간 200ms 간격으로 재확인합니다.
 */
function waitForGoogleSDK_(callback, container, errorEl, attemptsLeft){
  if (attemptsLeft === undefined) attemptsLeft = 25; // 25 * 200ms = 5초
  if (window.google && google.accounts && google.accounts.id){
    callback();
    return;
  }
  if (attemptsLeft <= 0){
    container.innerHTML = '';
    errorEl.style.display = 'block';
    errorEl.textContent = '구글 로그인 라이브러리를 불러오지 못했습니다. 새로고침 해주세요.';
    return;
  }
  setTimeout(()=> waitForGoogleSDK_(callback, container, errorEl, attemptsLeft-1), 200);
}

/**
 * 구글 로그인 성공 시 호출됩니다.
 * 승인된 편집자/뷰어인지 서버에 확인한 뒤에만 실제 화면으로 들어갑니다.
 * (승인 안 된 계정은 목록 조회 자체가 안 되도록 보호)
 */
async function handleGateCredential(response){
  authToken = response.credential;
  authEmail = decodeJwtEmail_(authToken);

  document.getElementById('gateContent').innerHTML = `
    <div class="brand" style="justify-content:center; pointer-events:none;">RED BUTTON<span class="r-mark">®</span></div>
    <p style="margin-top:10px;">로그인 확인 중...</p>
  `;

  const result = await checkAccessOnServer(authToken);

  if (result.status === 'approved' || result.status === 'viewer_ok'){
    authEmail = result.email;
    cacheAuthToken(authToken, authEmail);
    if (result.status === 'approved') cacheEditorApproval(); // 편집자 승인까지 이미 확인된 상태
    await enterApp();
  } else if (result.status === 'pending'){
    renderGatePending_(!!result.newRequest);
  } else {
    renderGateDefault_();
    document.getElementById('gateError').style.display = 'block';
    document.getElementById('gateError').textContent = '로그인에 실패했습니다. 다시 시도해주세요.';
  }
}

/**
 * 구글 ID 토큰(JWT)의 payload를 클라이언트에서 간단히 디코딩해 이메일만 뽑아냅니다.
 * (화면 표시용일 뿐, 실제 검증은 서버에서 매번 다시 수행됩니다)
 */
function decodeJwtEmail_(token){
  try{
    const payloadB64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(payloadB64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    const payload = JSON.parse(json);
    return payload.email ? String(payload.email).toLowerCase() : null;
  }catch(e){ return null; }
}
