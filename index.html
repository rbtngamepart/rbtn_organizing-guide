const AUTH_TTL_MS = 50 * 60 * 1000; // 구글 ID 토큰 유효시간(~1시간)보다 약간 짧게

function getCachedAuthToken(){
  try{
    const token = localStorage.getItem('authToken');
    const email = localStorage.getItem('authEmail');
    const ts = Number(localStorage.getItem('authTokenTime') || 0);
    if (token && email && (Date.now()-ts) < AUTH_TTL_MS) return { token, email };
  }catch(e){ /* localStorage 사용 불가 환경이면 그냥 매번 로그인 */ }
  return null;
}
function cacheAuthToken(token, email){
  try{
    localStorage.setItem('authToken', token);
    localStorage.setItem('authEmail', email);
    localStorage.setItem('authTokenTime', String(Date.now()));
  }catch(e){}
}
function clearCachedAuthToken(){
  try{
    localStorage.removeItem('authToken');
    localStorage.removeItem('authEmail');
    localStorage.removeItem('authTokenTime');
  }catch(e){}
  authToken = null; authEmail = null;
}

const EDITOR_APPROVAL_TTL_MS = 10 * 60 * 1000; // 10분

function getCachedEditorApproval(){
  try{
    const ts = Number(localStorage.getItem('editorApprovedAt') || 0);
    const savedEmail = localStorage.getItem('editorApprovedEmail');
    if (ts && savedEmail && savedEmail === authEmail && (Date.now()-ts) < EDITOR_APPROVAL_TTL_MS) return true;
  }catch(e){}
  return false;
}
function cacheEditorApproval(){
  try{
    localStorage.setItem('editorApprovedAt', String(Date.now()));
    localStorage.setItem('editorApprovedEmail', authEmail || '');
  }catch(e){}
}
function clearCachedEditorApproval(){
  try{
    localStorage.removeItem('editorApprovedAt');
    localStorage.removeItem('editorApprovedEmail');
  }catch(e){}
}

/**
 * "편집자" 버튼 클릭 시 호출됩니다.
 * 이미 로그인 게이트를 통과한 상태이므로, 새 팝업 없이 그 토큰으로 승인 여부만 확인합니다.
 * 10분 안에 이미 승인 확인이 됐다면 서버에 다시 묻지 않고 바로 전환합니다.
 */
async function enterEditorMode(){
  if (!authToken){ showGate(); return; }

  if (getCachedEditorApproval()){
    setRole('editor');
    return;
  }

  showToast('권한 확인 중...');
  const result = await requestEditorUpgradeOnServer(authToken);

  if (result.status === 'approved'){
    authEmail = result.email;
    cacheAuthToken(authToken, authEmail);
    cacheEditorApproval(); // 10분 창 시작(연장)
    setRole('editor');
    showToast('편집자로 전환되었습니다 (' + authEmail + ')');
  } else if (result.status === 'pending'){
    showToast(result.newRequest ? '편집자 권한 요청이 접수되었습니다. 승인을 기다려주세요.' : '아직 승인 대기 중입니다. 편집자에게 문의해주세요.', 'error');
  } else if (result.status === 'invalid_token'){
    showToast('로그인이 만료되었습니다. 다시 로그인해주세요.', 'error');
    clearCachedAuthToken();
    clearCachedEditorApproval();
    showGate();
  } else {
    showToast('권한 확인 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }
}

/**
 * 구글 로그인 스크립트(gsi/client)는 async로 로딩되기 때문에, 시크릿 창처럼
 * 캐시가 없어 느린 환경에서는 페이지가 그려질 때 아직 준비 안 됐을 수 있습니다.
 * 즉시 실패 처리하지 않고, 최대 5초간 200ms 간격으로 재확인합니다.
 */
function waitForGoogleSDK_(callback, container, errorEl, attemptsLeft){
  if (attemptsLeft === undefined) attemptsLeft = 25; // 25 * 200ms = 5초
  if (window.google && google.accounts && google.accounts.id){
    callback();
    return;
  }
  if (attemptsLeft <= 0){
    container.innerHTML = '';
    errorEl.style.display = 'block';
    errorEl.textContent = '구글 로그인 라이브러리를 불러오지 못했습니다. 새로고침 해주세요.';
    return;
  }
  setTimeout(()=> waitForGoogleSDK_(callback, container, errorEl, attemptsLeft-1), 200);
}

/**
 * 구글 로그인 성공 시 호출됩니다.
 * 승인된 편집자/뷰어인지 서버에 확인한 뒤에만 실제 화면으로 들어갑니다.
 * (승인 안 된 계정은 목록 조회 자체가 안 되도록 보호)
 */
async function handleGateCredential(response){
  authToken = response.credential;
  authEmail = decodeJwtEmail_(authToken);

  document.getElementById('gateContent').innerHTML = `
    <div class="brand" style="justify-content:center; pointer-events:none;">RED BUTTON<span class="r-mark">®</span></div>
    <p style="margin-top:10px;">로그인 확인 중...</p>
  `;

  const result = await checkAccessOnServer(authToken);

  if (result.status === 'approved' || result.status === 'viewer_ok'){
    authEmail = result.email;
    cacheAuthToken(authToken, authEmail);
    if (result.status === 'approved') cacheEditorApproval(); // 편집자 승인까지 이미 확인된 상태
    await enterApp();
  } else if (result.status === 'pending'){
    renderGatePending_(!!result.newRequest);
  } else if (result.status === 'needs_profile'){
    await renderGateProfileForm_();
  } else {
    renderGateDefault_();
    document.getElementById('gateError').style.display = 'block';
    document.getElementById('gateError').textContent = '로그인에 실패했습니다. 다시 시도해주세요.';
  }
}

const POSITIONS = ['점주','점장','매니저','트레이너','버트너','본사'];

/**
 * 처음 로그인한 사람에게 매장·이름·직급을 입력받는 신청서 화면입니다.
 */
async function renderGateProfileForm_(){
  document.getElementById('gateContent').innerHTML = `
    <div class="brand" style="justify-content:center; pointer-events:none;">RED BUTTON<span class="r-mark">®</span></div>
    <p style="margin-top:10px; margin-bottom:14px;">처음 로그인하셨네요. 접근 요청을 위해<br>아래 정보를 입력해주세요.</p>
    <div id="gateProfileFormBody" style="text-align:left;">
      <div style="font-size:12px; color:var(--ink-soft); text-align:center;">불러오는 중...</div>
    </div>
  `;

  let stores = [];
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'listStores', idToken:authToken })
    });
    const data = await res.json();
    stores = (data && data.stores) || [];
  }catch(e){ console.error(e); }

  stores = stores.slice().sort((a,b)=> String(a.name).localeCompare(String(b.name), 'ko'));

  document.getElementById('gateProfileFormBody').innerHTML = `
    <div class="field">
      <label>매장</label>
      <select id="gateStoreSelect">
        <option value="">매장을 선택하세요</option>
        ${stores.map(s=>`<option value="${s.code}">${s.name}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="gateNameInput" placeholder="홍길동">
    </div>
    <div class="field">
      <label>직급</label>
      <select id="gatePositionSelect">
        <option value="">직급을 선택하세요</option>
        ${POSITIONS.map(p=>`<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <div id="gateProfileError" style="display:none; color:var(--danger); font-size:12.5px; margin-bottom:8px;"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="submitGateProfile_()">제출</button>
  `;
}

async function submitGateProfile_(){
  const storeCode = document.getElementById('gateStoreSelect').value;
  const name = document.getElementById('gateNameInput').value.trim();
  const position = document.getElementById('gatePositionSelect').value;
  const errorEl = document.getElementById('gateProfileError');

  if (!storeCode || !name || !position){
    errorEl.style.display = 'block';
    errorEl.textContent = '매장·이름·직급을 모두 입력해주세요.';
    return;
  }
  errorEl.style.display = 'none';

  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'submitAccessRequest', idToken:authToken, name, position, storeCode })
    });
    const result = await res.json();
    if (result.status === 'pending'){
      renderGatePending_(!!result.newRequest);
    } else {
      errorEl.style.display = 'block';
      errorEl.textContent = '제출 중 문제가 발생했습니다. 다시 시도해주세요.';
    }
  }catch(e){
    console.error(e);
    errorEl.style.display = 'block';
    errorEl.textContent = '서버 오류가 발생했습니다.';
  }
}

/**
 * 구글 ID 토큰(JWT)의 payload를 클라이언트에서 간단히 디코딩해 이메일만 뽑아냅니다.
 * (화면 표시용일 뿐, 실제 검증은 서버에서 매번 다시 수행됩니다)
 */
function decodeJwtEmail_(token){
  try{
    const payloadB64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(payloadB64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    const payload = JSON.parse(json);
    return payload.email ? String(payload.email).toLowerCase() : null;
  }catch(e){ return null; }
}

async function enterApp(){
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('app').innerHTML = `<div class="empty">게임 목록을 불러오는 중입니다...</div>`;
  scheduleTokenRefresh_(); // 만료 전에 조용히 새 토큰을 미리 받아오도록 예약
  await loadGames();
  render();
}

let tokenRefreshTimer_ = null;

/**
 * 구글 로그인 토큰은 보통 1시간 정도 유효합니다. 만료되어 작업 중간에
 * 로그인 화면으로 튕기는 걸 막기 위해, 50분마다 조용히 새 토큰을 미리
 * 받아옵니다. (사용자가 이미 구글에 로그인되어 있으면 화면 깜빡임 없이
 * 백그라운드에서 자동으로 처리됩니다)
 */
function scheduleTokenRefresh_(){
  if (tokenRefreshTimer_) clearTimeout(tokenRefreshTimer_);
  tokenRefreshTimer_ = setTimeout(silentRefreshToken_, 50 * 60 * 1000);
}

function silentRefreshToken_(){
  if (typeof google === 'undefined' || !google.accounts || !google.accounts.id){
    scheduleTokenRefresh_(); // 라이브러리가 잠깐 안 떠있으면 다음 주기에 다시 시도
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    auto_select: true,
    callback: (response)=>{
      authToken = response.credential;
      cacheAuthToken(authToken, authEmail);
      scheduleTokenRefresh_(); // 다음 갱신도 이어서 예약
    }
  });
  // auto_select가 되어있고 구글 로그인 세션이 살아있으면, 화면에 아무 것도
  // 안 보이고 조용히 콜백만 실행되는 경우가 많습니다.
  google.accounts.id.prompt();
}

async function checkAccessOnServer(idToken){
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'checkAccess', idToken })
    });
    return await res.json();
  }catch(e){
    console.error(e);
    showToast('로그인 확인 중 오류가 발생했습니다.', 'error');
    return { status: 'error' };
  }
}

async function requestEditorUpgradeOnServer(idToken){
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'requestEditorUpgrade', idToken })
    });
    return await res.json();
  }catch(e){
    console.error(e);
    showToast('권한 확인 중 오류가 발생했습니다.', 'error');
    return { status: 'error' };
  }
}

/**
 * ============================================================
 * 권한 관리 (승인된 편집자만 접근 가능)
 * ============================================================
 */
async function showAccessModal(){
  if (!authToken){ showToast('로그인이 필요합니다.', 'error'); return; }
  showToast('권한 목록 불러오는 중...');
  const data = await fetchAccessList();
  if (!data || !data.success){
    showToast('권한 목록을 불러오지 못했습니다. (' + (data && data.error || '') + ')', 'error');
    return;
  }
  renderAccessModal(data.editors, data.viewers, data.pending, data.profiles||{}, data.stores||[]);
}

async function fetchAccessList(){
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'listAccess', idToken:authToken })
    });
    return await res.json();
  }catch(e){
    console.error(e);
    return null;
  }
}

function storeNameByCode_(stores, code){
  const s = stores.find(x=>x.code===code);
  return s ? s.name : null;
}

function personLabel_(email, profiles, stores){
  const p = profiles[email] || {};
  const storeName = p.storeCode ? storeNameByCode_(stores, p.storeCode) : null;
  const parts = [p.name, storeName, p.position].filter(Boolean).join(' · ');
  const safeCurrentName = (p.name||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const nameHtml = parts
    ? `<div><b>${parts}</b><div class="access-email-sub">${email}</div></div>`
    : `<span class="access-email-only">${email}</span>`;
  return `<div class="access-person">
    ${nameHtml}
    <button class="access-edit-name" onclick="editPersonName('${email}','${safeCurrentName}')" title="이름 수정">✏️</button>
  </div>`;
}

async function editPersonName(email, currentName){
  const newName = prompt('이름을 입력하세요.', currentName || '');
  if (newName === null) return; // 취소
  await postAccessAction('updateProfile', email, null, null, null, newName.trim());
  showAccessModal();
}

function renderAccessModal(editors, viewers, pending, profiles, stores){
  const old = document.getElementById('accessBackdrop');
  if (old) old.remove();
  const sortedStores = stores.slice().sort((a,b)=> String(a.name).localeCompare(String(b.name), 'ko'));

  const storeSelectHtml = (email) => {
    const currentCode = (profiles[email] && profiles[email].storeCode) || '';
    return `<select id="storeSel-${email.replace(/[^a-zA-Z0-9]/g,'')}" class="access-store-select">
      <option value="">매장 미지정</option>
      ${sortedStores.map(s=>`<option value="${s.code}" ${s.code===currentCode?'selected':''}>${s.name}</option>`).join('')}
    </select>`;
  };

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'accessBackdrop';
  backdrop.innerHTML = `
    <div class="modal access-modal">
      <h3>권한 관리</h3>
      <div class="access-section">
        <div class="access-section-title">승인 대기 중 (${pending.length})</div>
        ${pending.length ? pending.map(email=>{
          const safeId = email.replace(/[^a-zA-Z0-9]/g,'');
          return `
          <div class="access-row access-row-pending">
            ${personLabel_(email, profiles, stores)}
            <div class="access-actions">
              ${storeSelectHtml(email)}
              <button class="btn btn-primary" style="padding:5px 10px; font-size:12px;" onclick="approveEmail('${email}','editor','${safeId}')">편집자로 승인</button>
              <button class="btn btn-ghost" style="padding:5px 10px; font-size:12px;" onclick="approveEmail('${email}','viewer','${safeId}')">뷰어로 승인</button>
              <button class="btn btn-ghost" style="padding:5px 10px; font-size:12px;" onclick="rejectEmail('${email}')">거절</button>
            </div>
          </div>`;
        }).join('') : '<div class="access-empty">대기 중인 요청이 없습니다.</div>'}
      </div>
      <div class="access-section">
        <div class="access-section-title">승인된 편집자 (${editors.length})</div>
        ${editors.length ? editors.map(email=>`
          <div class="access-row">
            ${personLabel_(email, profiles, stores)}
            <button class="btn btn-ghost" style="padding:5px 10px; font-size:12px;" onclick="removeApprovedEmail('${email}')">삭제</button>
          </div>`).join('') : '<div class="access-empty">등록된 편집자가 없습니다.</div>'}
      </div>
      <div class="access-section">
        <div class="access-section-title">승인된 뷰어 (${viewers.length})</div>
        ${viewers.length ? viewers.map(email=>`
          <div class="access-row">
            ${personLabel_(email, profiles, stores)}
            <button class="btn btn-ghost" style="padding:5px 10px; font-size:12px;" onclick="removeApprovedEmail('${email}')">삭제</button>
          </div>`).join('') : '<div class="access-empty">등록된 뷰어가 없습니다.</div>'}
      </div>
      <div class="access-section">
        <div class="access-section-title">이메일로 직접 등록 (요청 없이 먼저 권한 부여)</div>
        <div class="access-row">
          <input type="email" id="newApprovedEmail" placeholder="example@gmail.com" style="flex:1; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:13px;">
          <select id="newApprovedStore" class="access-store-select">
            <option value="">매장 미지정</option>
            ${sortedStores.map(s=>`<option value="${s.code}">${s.name}</option>`).join('')}
          </select>
          <select id="newApprovedRole" style="border:1px solid var(--line); border-radius:6px; padding:7px 6px; font-size:12.5px;">
            <option value="viewer" selected>뷰어</option>
            <option value="editor">편집자</option>
          </select>
          <button class="btn btn-primary" style="padding:7px 12px; font-size:12px;" onclick="addApprovedEmailFromInput()">등록</button>
        </div>
      </div>
      <div class="access-section">
        <div class="access-section-title">매장 추가 (등록된 매장 ${stores.length}개)</div>
        <div class="access-row">
          <input type="text" id="newStoreCode" placeholder="매장 코드 (예: RB260701_01)" style="flex:1; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:13px;">
          <input type="text" id="newStoreName" placeholder="매장명 (예: 강남점)" style="flex:1; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font-size:13px;">
          <button class="btn btn-primary" style="padding:7px 12px; font-size:12px;" onclick="addStoreFromInput()">추가</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="document.getElementById('accessBackdrop').remove()">닫기</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
}

async function approveEmail(email, roleType, safeId){
  const sel = document.getElementById('storeSel-' + safeId);
  const storeCode = sel ? sel.value : '';
  await postAccessAction('approveRequest', email, roleType, storeCode);
  showAccessModal();
}
async function rejectEmail(email){
  if (!confirm(email + ' 요청을 거절할까요?')) return;
  await postAccessAction('rejectRequest', email);
  showAccessModal();
}
async function removeApprovedEmail(email){
  if (!confirm(email + '의 접근 권한을 삭제할까요?')) return;
  await postAccessAction('removeApprovedEmail', email);
  showAccessModal();
}
function addApprovedEmailFromInput(){
  const input = document.getElementById('newApprovedEmail');
  const roleSelect = document.getElementById('newApprovedRole');
  const storeSelect = document.getElementById('newApprovedStore');
  const email = input.value.trim();
  if (!email || email.indexOf('@')===-1){ showToast('올바른 이메일을 입력해주세요.', 'error'); return; }
  postAccessAction('addApprovedEmail', email, roleSelect.value, storeSelect.value).then(()=> showAccessModal());
}
function addStoreFromInput(){
  const code = document.getElementById('newStoreCode').value.trim();
  const name = document.getElementById('newStoreName').value.trim();
  if (!code || !name){ showToast('매장 코드와 매장명을 모두 입력해주세요.', 'error'); return; }
  postStoreAction('addStore', code, name).then(()=> showAccessModal());
}
async function postStoreAction(action, code, name){
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action, idToken:authToken, code, name })
    });
    const result = await res.json();
    if (!result.success) showToast('처리 실패: ' + (result.error||''), 'error');
    else showToast('처리되었습니다.');
  }catch(e){
    console.error(e);
    showToast('서버 오류가 발생했습니다.', 'error');
  }
}
async function postAccessAction(action, targetEmail, roleType, storeCode, position, name){
  try{
    const res = await fetch(WEB_APP_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action, idToken:authToken, targetEmail, roleType, storeCode, position, name })
    });
    const result = await res.json();
    if (!result.success) showToast('처리 실패: ' + (result.error||''), 'error');
    else showToast('처리되었습니다.');
  }catch(e){
    console.error(e);
    showToast('서버 오류가 발생했습니다.', 'error');
  }
}
document.getElementById('newGameBtn').addEventListener('click', ()=>{
  const backdrop = document.createElement('div');
  backdrop.className='modal-backdrop';
  backdrop.innerHTML = `<div class="modal"><h3>새 가이드 만들기</h3>
    <div class="field"><label>게임 ID</label><input id="newId" placeholder="예: 501"></div>
    <div class="field"><label>게임명</label><input id="newName" placeholder="예: 아그리콜라"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="this.closest('.modal-backdrop').remove()">취소</button>
      <button class="btn btn-primary" id="createConfirm">생성</button>
    </div></div>`;
  document.body.appendChild(backdrop);
  document.getElementById('createConfirm').addEventListener('click', async ()=>{
    const id = document.getElementById('newId').value.trim();
    const name = document.getElementById('newName').value.trim();
    if (!id || !name){ showToast('게임 ID와 게임명을 입력해주세요.', 'error'); return; }
    games.push({id, name, cases:[], photos:[{markers:[]}]});
    await saveGames(id);
    backdrop.remove();
    openGame(id);
  });
});

(async function init(){
  const cached = getCachedAuthToken();
  if (cached){
    authToken = cached.token;
    authEmail = cached.email;
    await enterApp();
  } else {
    showGate();
  }
})();
</script>
